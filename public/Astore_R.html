<!DOCTYPE html>
<html>
<head>

<title>Agriculture Store Registration</title>

<link rel="stylesheet" href="store.css">

</head>

<body>

<div class="form-box">

<h2>🏪 Agriculture Store Registration</h2>

<input type="text" id="name" placeholder="Store Owner Name">

<input type="text" id="mobile" placeholder="Mobile Number">


<input type="email" id="email" placeholder="Email Address">
<input type="text" id="Password" placeholder="Enter Password">

<button type="button" onclick="sendOTP()">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">

<label>Upload Store License</label>
<input type="file" id="license">

<label>
<input type="checkbox" id="agree"> I agree to terms and conditions
</label>

<button type="button" onclick="registerStore()">Register</button>

<p id="msg"></p>

</div>

<script src="store.js"></script>

</body>
</html>
