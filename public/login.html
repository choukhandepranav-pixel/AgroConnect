<!DOCTYPE html>
<html>
<head>
<title>Login - AgroConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: radial-gradient(circle at top,#0f172a,#020617);
color:#e5e7eb;
}

/* CARD */

.login-card{
width:100%;
max-width:420px;
background:linear-gradient(145deg,#1e293b,#020617);
padding:40px;
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.7);
border:1px solid rgba(255,255,255,0.05);
text-align:center;
}

.login-card h2{
font-size:32px;
color:#22c55e;
margin-bottom:25px;
}

/* INPUT */

.login-card input{
width:100%;
padding:14px;
margin-bottom:18px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
background:#020617;
color:white;
font-size:14px;
outline:none;
transition:0.3s;
}

.login-card input:focus{
background:white;
color:#111;
border-color:#22c55e;
box-shadow:0 0 10px rgba(34,197,94,0.4);
}

/* BUTTON */

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:5px;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 15px 30px rgba(34,197,94,0.4);
}

#msg{
margin-top:10px;
font-size:14px;
}

/* FOOTER */

.footer{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

.footer a{
color:#22c55e;
font-weight:600;
text-decoration:none;
}

.footer a:hover{
color:white;
text-decoration:underline;
}

.back-home{
display:block;
margin-top:8px;
font-size:13px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="login-card">

<h2 id="formTitle">Login</h2>

<!-- LOGIN FORM -->
<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit" class="login-btn">Login</button>

</form>


<!-- RESET PASSWORD FORM -->

<form id="resetForm" style="display:none;">

<input type="email" id="resetEmail" placeholder="Enter your email" required>

<input type="password" id="newPassword" placeholder="New Password" required>

<input type="password" id="confirmPassword" placeholder="Confirm New Password" required>

<button type="submit" class="login-btn">Reset Password</button>

<button type="button" id="backToLogin" class="login-btn" style="background:#64748b;margin-top:10px;">Back to Login</button>

</form>


<p id="msg"></p>


<div class="footer">

<p>New to AgroConnect? <a href="register.html">Create an account</a></p>

<a href="#" id="forgotLink">Forgot Password?</a>

<a href="index.html" class="back-home">← Back to Home</a>

</div>

</div>


<script>

/* LOGIN */

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const res = await fetch("http://localhost:5000/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

const msg = document.getElementById("msg");

msg.innerText = data.message;
msg.style.color = res.ok ? "#22c55e" : "#f87171";

if(res.ok){

localStorage.setItem("agroUser", JSON.stringify(data.user));

window.location.href = "index.html";

}

});


/* SHOW RESET FORM */

document.getElementById("forgotLink").addEventListener("click", function(e){

e.preventDefault();

document.getElementById("loginForm").style.display="none";

document.getElementById("resetForm").style.display="block";

document.getElementById("formTitle").innerText="Reset Password";

document.getElementById("msg").innerText="";
/* AUTO FILL EMAIL */
document.getElementById("resetEmail").value =
document.getElementById("email").value;

});


/* BACK TO LOGIN */

document.getElementById("backToLogin").addEventListener("click", function(){

document.getElementById("resetForm").style.display="none";

document.getElementById("loginForm").style.display="block";

document.getElementById("formTitle").innerText="Login";

document.getElementById("msg").innerText="";

});


/* RESET PASSWORD */

document.getElementById("resetForm").addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("resetEmail").value;
const newPassword = document.getElementById("newPassword").value;
const confirmPassword = document.getElementById("confirmPassword").value;

const msg = document.getElementById("msg");

if(newPassword !== confirmPassword){

msg.innerText="Passwords do not match";
msg.style.color="#f87171";
return;

}

if(newPassword.length < 6){

msg.innerText="Password must be at least 6 characters";
msg.style.color="#f87171";
return;

}

const res = await fetch("http://localhost:5000/api/reset-password",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,newPassword})

});

const data = await res.json();

msg.innerText = data.message;
msg.style.color = res.ok ? "#22c55e" : "#f87171";

if(res.ok){
  msg.innerText="Password reset successful! Logging you back to login...";
  document.getElementById("password").value="";
  setTimeout(()=>{
    document.getElementById("resetForm").style.display="none";
    document.getElementById("loginForm").style.display="block";
    document.getElementById("formTitle").innerText="Login";
  }, 2000);
}
});


</script>

</body>
</html>
